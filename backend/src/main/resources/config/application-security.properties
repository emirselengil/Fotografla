# JWT (HS256): secret must be at least 32 bytes. Override in production with JWT_SECRET.
app.security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-1234567890}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

# Comma-separated origins for browser clients
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# When false, all HTTP requests are permitted without JWT (local dev only).
app.security.require-authentication=${APP_SECURITY_REQUIRE_AUTH:true}
