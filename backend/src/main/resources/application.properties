spring.application.name=fotografla-backend
spring.config.import=optional:classpath:application-dev.properties

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fotografla?stringtype=unspecified}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-1234567890}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.event.status-sync-interval-ms=${EVENT_STATUS_SYNC_INTERVAL_MS:60000}
