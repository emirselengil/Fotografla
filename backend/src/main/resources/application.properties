spring.application.name=fotografla-backend
spring.config.import=classpath:config/application-security.properties,optional:classpath:application-dev.properties

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fotografla?stringtype=unspecified}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.event.status-sync-interval-ms=${EVENT_STATUS_SYNC_INTERVAL_MS:60000}

# Misafir portal taban URL (QR icerigi; sonunda / olmadan)
app.guest-portal.base-url=${GUEST_PORTAL_BASE_URL:http://localhost:3000}
